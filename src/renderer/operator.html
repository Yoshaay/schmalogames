<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Schmalogames — Operator</title>
    <style>
      /* TheSans (BR-Hausschrift) — liegt gebündelt in dist/renderer/fonts */
      @font-face {
        font-family: 'TheSans';
        src: url('fonts/TheSansC5s-5_Plain.otf') format('opentype');
        font-weight: 400;
      }
      @font-face {
        font-family: 'TheSans';
        src: url('fonts/TheSansC5s-6_SemiBold.otf') format('opentype');
        font-weight: 600;
      }
      @font-face {
        font-family: 'TheSans';
        src: url('fonts/TheSansC5s-7_Bold.otf') format('opentype');
        font-weight: 700;
      }
      @font-face {
        font-family: 'TheSans';
        src: url('fonts/TheSansC5s-8_ExtraBold.otf') format('opentype');
        font-weight: 800;
      }

      :root {
        --bg: #0e0f13;
        --panel: #16181f;
        --panel-edge: #262a35;
        --ink: #e8e9ee;
        --ink-dim: #7c8194;
        --primary: #94c01c;
        --primary-bright: #9be600;
        --primary-deep: #6d8f12;
        --blue: #2699d6;
        --live: #e71d73;
        --ok: #9be600;
        --font-display: 'TheSans', 'Avenir Next Condensed', 'Futura', 'Arial Narrow', sans-serif;
        --font-mono: 'SF Mono', 'Menlo', 'Monaco', monospace;
        --font-body: 'TheSans', 'Avenir Next', 'Helvetica Neue', sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 14px;
        overflow: hidden;
        user-select: none;
      }

      body {
        display: flex;
        flex-direction: column;
        background-image: radial-gradient(ellipse 80% 60% at 50% -10%, #1a1d28 0%, var(--bg) 60%);
      }

      /* ---------- Kopfzeile ---------- */
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 20px 12px;
        border-bottom: 1px solid var(--panel-edge);
      }
      header h1 {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 0.06em;
      }
      header h1 span {
        color: var(--primary);
      }
      .header-sub {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--ink-dim);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding-top: 6px;
      }
      .spacer {
        flex: 1;
      }

      .onair {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.2em;
        padding: 6px 14px;
        border: 1px solid var(--panel-edge);
        border-radius: 4px;
        color: var(--ink-dim);
      }
      .onair .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #3a3e4c;
      }
      .onair.live {
        color: var(--live);
        border-color: rgba(231, 29, 115, 0.5);
      }
      .onair.live .dot {
        background: var(--live);
        animation: blink 1.1s steps(2, jump-none) infinite;
        box-shadow: 0 0 10px rgba(231, 29, 115, 0.8);
      }
      @keyframes blink {
        50% {
          opacity: 0.35;
        }
      }

      /* ---------- Layout ---------- */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 16px;
        padding: 16px 20px 20px;
        min-height: 0;
      }
      .col {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-height: 0;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-edge);
        border-radius: 6px;
        padding: 14px 16px 16px;
      }
      .panel h2 {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel h2::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--panel-edge);
      }

      /* ---------- Vorschau ---------- */
      .preview-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .preview-frame {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        border: 1px solid var(--panel-edge);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .preview-frame video {
        max-width: 100%;
        max-height: 100%;
        display: block;
      }
      .preview-frame .no-signal {
        position: absolute;
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.3em;
        color: #3a3e4c;
      }

      /* ---------- Status ---------- */
      #status {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
      }
      .stat {
        background: #101218;
        border: 1px solid var(--panel-edge);
        border-radius: 4px;
        padding: 10px 12px;
      }
      .stat .k {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-bottom: 4px;
      }
      .stat .v {
        font-family: var(--font-mono);
        font-size: 22px;
        font-weight: 600;
        color: var(--primary);
        font-variant-numeric: tabular-nums;
      }
      .status-empty {
        font-size: 13px;
        color: var(--ink-dim);
      }

      /* ---------- Buttons ---------- */
      button {
        font-family: var(--font-body);
        font-size: 14px;
        color: var(--ink);
        background: #1d2029;
        border: 1px solid var(--panel-edge);
        border-radius: 4px;
        padding: 10px 14px;
        cursor: pointer;
        transition:
          background 0.12s,
          border-color 0.12s,
          transform 0.05s;
      }
      button:hover {
        background: #262a37;
        border-color: #3a4052;
      }
      button:active {
        transform: translateY(1px);
      }
      button.fullscreen-on {
        color: var(--primary);
        border-color: rgba(148, 192, 28, 0.4);
        background: rgba(148, 192, 28, 0.1);
      }

      .game-btn {
        display: block;
        width: 100%;
        text-align: left;
        font-size: 15px;
        padding: 12px 14px;
        margin-bottom: 8px;
        border-left: 3px solid transparent;
      }
      .game-btn.active {
        border-left-color: var(--primary);
        background: linear-gradient(90deg, rgba(148, 192, 28, 0.14), transparent 70%);
        color: var(--primary);
      }
      .game-desc {
        font-size: 12px;
        color: var(--ink-dim);
        margin: -4px 0 10px 3px;
        line-height: 1.4;
      }

      .btn-stop {
        width: 100%;
        color: #f27bab;
        border-color: rgba(231, 29, 115, 0.35);
      }
      .btn-stop:hover {
        background: rgba(231, 29, 115, 0.12);
        border-color: rgba(231, 29, 115, 0.6);
      }

      .btn-action {
        width: 100%;
        margin-bottom: 8px;
        color: var(--primary);
        border-color: rgba(148, 192, 28, 0.4);
        font-weight: 600;
      }
      .btn-action:hover {
        background: rgba(148, 192, 28, 0.14);
        border-color: var(--primary-deep);
      }

      /* ---------- Regler ---------- */
      .setting {
        margin-bottom: 14px;
      }
      .setting .row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 6px;
      }
      .setting label {
        font-size: 13px;
        color: var(--ink);
      }
      .setting .val {
        font-family: var(--font-mono);
        font-size: 14px;
        color: var(--primary);
        font-variant-numeric: tabular-nums;
      }
      input[type='range'] {
        width: 100%;
        appearance: none;
        height: 4px;
        border-radius: 2px;
        background: #2a2e3b;
        outline: none;
      }
      input[type='range']::-webkit-slider-thumb {
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--primary);
        border: 2px solid #0e0f13;
        box-shadow: 0 0 0 1px var(--primary-deep);
        cursor: grab;
      }
      input[type='range']:active::-webkit-slider-thumb {
        cursor: grabbing;
      }

      .hint {
        font-size: 12px;
        color: var(--ink-dim);
        line-height: 1.5;
      }

      /* ---------- Live-Fader ---------- */
      #live {
        display: flex;
        justify-content: center;
        gap: 36px;
        padding: 6px 0 2px;
      }
      .fader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .fader-val {
        font-family: var(--font-mono);
        font-size: 24px;
        font-weight: 600;
        color: var(--primary);
        font-variant-numeric: tabular-nums;
      }
      .fader-body {
        display: flex;
        align-items: stretch;
        gap: 12px;
        /* Luft für die überstehende Fader-Kappe an den Endanschlägen */
        margin: 10px 0;
      }
      .fader-scale {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-end;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--ink-dim);
        transform: translateY(-0.5em);
        margin-bottom: -1em;
      }
      .fader-track {
        position: relative;
        width: 58px;
        height: 300px;
        background: #101218;
        border: 1px solid var(--panel-edge);
        border-radius: 6px;
        cursor: grab;
        touch-action: none;
      }
      .fader-track:active {
        cursor: grabbing;
      }
      /* Farbzonen wie das Meter auf der Wall: unten grün, dann orange, oben pink */
      .fader-zones {
        position: absolute;
        inset: 1px;
        border-radius: 5px;
        background: linear-gradient(
          to top,
          #94c01c 0%,
          #94c01c 50%,
          #f9b233 50%,
          #f9b233 75%,
          #e71d73 75%,
          #e71d73 100%
        );
      }
      .zones-hint {
        opacity: 0.12;
      }
      .fader-ticks {
        position: absolute;
        inset: 1px;
        border-radius: 5px;
        background: repeating-linear-gradient(
          to top,
          transparent 0,
          transparent calc(10% - 1px),
          rgba(255, 255, 255, 0.09) calc(10% - 1px),
          rgba(255, 255, 255, 0.09) 10%
        );
        pointer-events: none;
      }
      .fader-grip {
        position: absolute;
        left: -9px;
        right: -9px;
        height: 34px;
        margin-bottom: -17px;
        border-radius: 5px;
        background: linear-gradient(#3a3f4e, #20232d 45%, #171a22);
        border: 1px solid #4a5064;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.55);
        pointer-events: none;
      }
      .fader-grip::after {
        content: '';
        position: absolute;
        left: 7px;
        right: 7px;
        top: 50%;
        height: 2px;
        margin-top: -1px;
        background: var(--primary);
        border-radius: 1px;
        box-shadow: 0 0 6px rgba(148, 192, 28, 0.7);
      }
      .fader-label {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-dim);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>SCHMALO<span>GAMES</span></h1>
      <div class="header-sub">Videowall Operator</div>
      <div class="spacer"></div>
      <div class="onair" id="onair"><span class="dot"></span><span id="onair-label">STANDBY</span></div>
      <button id="fullscreen">Wall-Vollbild ⛶</button>
    </header>

    <main>
      <div class="col">
        <div class="panel preview-panel">
          <h2>Vorschau — Videowall</h2>
          <div class="preview-frame">
            <span class="no-signal">KEIN SIGNAL</span>
            <video id="preview" autoplay muted playsinline></video>
          </div>
        </div>
        <div class="panel" id="game-panel" hidden>
          <h2 id="game-panel-title">Spiel</h2>
          <div id="game-ui"></div>
        </div>
        <div class="panel">
          <h2>Status</h2>
          <div id="status"><div class="status-empty">Kein Spiel aktiv.</div></div>
        </div>
      </div>

      <div class="col">
        <div class="panel">
          <h2>Spiele</h2>
          <div id="games"></div>
          <button class="btn-stop" id="stop">■ Stop — Leerlaufbild</button>
        </div>
        <div class="panel" id="live-panel" hidden>
          <h2>Live</h2>
          <div id="live"></div>
        </div>
        <div class="panel">
          <h2>Einstellungen</h2>
          <div id="settings"><div class="hint">Spiel starten, um Einstellungen zu sehen.</div></div>
        </div>
        <div class="panel">
          <h2>Aktionen</h2>
          <div id="actions"><div class="hint">—</div></div>
        </div>
      </div>
    </main>

    <script src="operator.js"></script>
  </body>
</html>
