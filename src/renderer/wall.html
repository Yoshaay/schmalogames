<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Schmalogames — Videowall</title>
    <style>
      /* TheSans (BR-Hausschrift) — liegt gebündelt in dist/renderer/fonts */
      @font-face {
        font-family: 'TheSans';
        src: url('fonts/TheSansC5s-5_Plain.otf') format('opentype');
        font-weight: 400;
      }
      @font-face {
        font-family: 'TheSans';
        src: url('fonts/TheSansC5s-6_SemiBold.otf') format('opentype');
        font-weight: 600;
      }
      @font-face {
        font-family: 'TheSans';
        src: url('fonts/TheSansC5s-7_Bold.otf') format('opentype');
        font-weight: 700;
      }
      @font-face {
        font-family: 'TheSans';
        src: url('fonts/TheSansC5s-8_ExtraBold.otf') format('opentype');
        font-weight: 800;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        cursor: none;
      }
      canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script src="wall.js"></script>
  </body>
</html>
